# ─────────────────────────────────────────────────────────────────
# 수집 소스
# ─────────────────────────────────────────────────────────────────
sources:
  naver:
    enabled:     true
    display:     "Naver News"
    api_base:    "https://openapi.naver.com/v1/search/news.json"
    daily_limit: 25000

  daum:
    enabled: true
    display: "Daum News"
    rss_feeds:
      - url:           "https://news.daum.net/rss/entertain"
        category_hint: "K-Drama"

  # 연합뉴스 영문 RSS (Yonhap News Agency — 실접속 확인 완료 2026-05-17)
  # 팩트 추출 후 LLM 재작성 → 출처 표기(Source: yonhap) → 합법적 활용
  public_rss:
    enabled: true
    feeds:
      - url:            "https://en.yna.co.kr/RSS/culture.xml"
        name:           "yonhap"
        display:        "Yonhap News Agency"
        lang:           "en"
        category_hints: ["K-Pop", "K-Drama", "K-Entertainment", "K-Beauty", "K-Fashion"]

      - url:            "https://en.yna.co.kr/RSS/sports.xml"
        name:           "yonhap"
        display:        "Yonhap News Agency"
        lang:           "en"
        category_hints: ["K-Sport"]

      - url:            "https://en.yna.co.kr/RSS/news.xml"
        name:           "yonhap"
        display:        "Yonhap News Agency"
        lang:           "en"
        category_hints: []

