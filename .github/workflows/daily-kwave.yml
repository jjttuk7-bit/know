name: KNow Daily Pipeline

on:
  schedule:
    - cron: '0 23 * * *'   # KST 08:00 = UTC 전날 23:00
  workflow_dispatch:         # 수동 실행 (테스트용)
    inputs:
      dry_run:
        description: 'Dry run (skip DB save & notifications)'
        type: boolean
        default: false

permissions:
  contents: write   # DB 커밋·푸시
  pages:    write   # GitHub Pages 배포
  id-token: write   # OIDC

jobs:
  # ────────────────────────────────────────────────────
  # 1. Python 파이프라인 — 수집 → LLM → DB 저장
  # ────────────────────────────────────────────────────
  pipeline:
    runs-on: ubuntu-latest
    outputs:
      has_articles: ${{ steps.run.outputs.has_articles }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0   # git push를 위해 전체 히스토리 필요

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run KNow pipeline
        id: run
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python -m agent.main --dry-run
          else
            python -m agent.main
          fi
          # DB 파일이 있으면 다음 job에 알림
          [ -f data/know.db ] && echo "has_articles=true" >> "$GITHUB_OUTPUT" || true
        env:
          OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          NAVER_CLIENT_ID:     ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          YOUTUBE_API_KEY:     ${{ secrets.YOUTUBE_API_KEY }}
          BUTTONDOWN_API_KEY:  ${{ secrets.BUTTONDOWN_API_KEY }}
          DISCORD_WEBHOOK:     ${{ secrets.DISCORD_WEBHOOK }}

  # ────────────────────────────────────────────────────
  # 2. Next.js 빌드 + GitHub Pages 배포
  # ────────────────────────────────────────────────────
  deploy:
    runs-on:  ubuntu-latest
    needs:    pipeline
    environment:
      name: github-pages
      url:  ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main   # pipeline job이 DB 커밋을 push한 최신 main

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install npm dependencies
        run: npm ci
        working-directory: website

      - name: Build Next.js (static export)
        run: npm run build
        working-directory: website
        env:
          STATIC_EXPORT: 'true'
          DB_PATH: ${{ github.workspace }}/data/know.db

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/out

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
